context:
  version: "5.0.0"

package:
  name: lockfile-lint
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/lockfile-lint/-/lockfile-lint-${{ version }}.tgz
  sha256: 2dc4ead906578eec2bf04a6c13044c56a942b1ebfdd7dc8e031fed34ca13b1a0

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - lockfile-lint --help

about:
  license: Apache-2.0
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: A CLI to lint a lockfile for security policies
  homepage: https://github.com/lirantal/lockfile-lint
  repository: https://github.com/lirantal/lockfile-lint

extra:
  recipe-maintainers:
    - danielnachun
